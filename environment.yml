  - numpy<2           # Good catch keeping this!
  - pytorch
  - torchvision
  - torchaudio
  - pytorch-cuda=12.1 # <--- THE CRITICAL FIX (Was 11.8)
  - fastapi
  - uvicorn
  - openai-whisper
  - python-multipart
  - requests
  - pyperclip
  - ffmpeg
  - pip
  - pip:
      - pygetwindow
      - pyautogui